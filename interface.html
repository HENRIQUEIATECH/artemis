<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Artemis AI</title>
    <style>
        /* CSS - Estilo Clean e Minimalista */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            height: 100 vh;
            align-items: center;
        }

        header {
            margin-top: 50px;
            text-align: center;
        }

        h1 {
            font-size: 3rem;
            color: #333;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-bottom: 30px;
        }

        /* Área de Respostas */
        #chat-container {
            width: 80%;
            max-width: 800px;
            flex-grow: 1;
            background: #ffffff;
            overflow-y: auto;
            padding: 20px;
            border-bottom: 1px solid #eee;
            margin-bottom: 20px;
        }

        .mensagem {
            margin-bottom: 15px;
            line-height: 1.6;
        }

        .bot-res { color: #555; border-left: 3px solid #333; padding-left: 10px; }
        .user-req { color: #000; font-weight: bold; text-align: right; }

        /* Área de Input */
        .input-area {
            width: 80%;
            max-width: 800px;
            display: flex;
            gap: 10px;
            padding-bottom: 50px;
        }

        input[type="text"] {
            flex-grow: 1;
            padding: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
            outline: none;
        }

        button {
            padding: 15px 30px;
            background-color: #333;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { background-color: #000; }

        footer {
            padding: 20px;
            font-size: 0.8rem;
            color: #999;
        }
    </style>
</head>
<body>

    <header>
        <h1>Artemis</h1>
    </header>

    <div id="chat-container">
        <div class="mensagem bot-res">Olá! Sou Artemis. Como posso ajudar sua biblioteca hoje?</div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Pergunte algo ao Artemis..." onkeypress="handleEnter(event)">
        <button onclick="enviarParaOMotor()">ENTER</button>
    </div>

    <footer>
        Artemis Engine v3.5 | Conectado ao Motor Main.c
    </footer>

    <script>
        // JavaScript - Lógica de Comunicação
        function handleEnter(event) {
            if (event.key === "Enter") enviarParaOMotor();
        }

        async function enviarParaOMotor() {
            const input = document.getElementById('userInput');
            const chat = document.getElementById('chat-container');
            
            if (input.value.trim() === "") return;

            // Adiciona pergunta na tela
            chat.innerHTML += `<div class="mensagem user-req">${input.value}</div>`;
            
            const prompt = input.value;
            input.value = ""; // Limpa campo

            // --- LÓGICA DE CONEXÃO COM O C ---
            // Para conectar com o seu main.c, você precisará de um "ponte" (backend)
            // Aqui simulamos a espera do motor:
            chat.innerHTML += `<div class="mensagem bot-res" id="loading">Artemis está pensando...</div>`;
            chat.scrollTop = chat.scrollHeight;

            try {
                // Exemplo de como seria a chamada para um servidor local que roda seu C
                // const response = await fetch(`http://localhost:8080/pergunta?q=${prompt}`);
                // const data = await response.text();
                
                // Simulação de resposta enquanto você não sobe o servidor:
                setTimeout(() => {
                    document.getElementById('loading').remove();
                    chat.innerHTML += `<div class="mensagem bot-res">Recebi seu comando: "${prompt}". Processando via motor Main...</div>`;
                    chat.scrollTop = chat.scrollHeight;
                }, 1000);

            } catch (error) {
                console.error("Erro ao conectar com o motor Main.c");
            }
        }
    </script>
</body>
</html>
